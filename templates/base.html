<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}guidestore{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ static_v }}">
</head>
<body class="{% block body_class %}{% endblock %}">
  <button type="button" class="menu-toggle" aria-label="メニュー">&#9776;</button>
  <div class="app">
    <div class="backdrop"></div>
    <aside class="sidebar">
      <a class="brand" href="{{ url_for('items.items_list') }}">
        <span class="brand-dot"></span> guidestore
      </a>
      <nav class="side-nav">
        <a class="side-link {% if request.endpoint == 'items.items_list' %}active{% endif %}"
           href="{{ url_for('items.items_list') }}">機器一覧</a>

        <span class="side-section-label">エクスポート</span>
        <a class="side-link" href="{{ url_for('export.export_archive') }}">Claude Code 向け</a>
        <span class="side-link-disabled" title="準備中">Web チャット向け</span>
      </nav>
      <a class="side-logout" href="{{ url_for('auth.logout') }}">ログアウト</a>
    </aside>
    <main class="main">
      <div class="content-inner">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>
  <script src="{{ url_for('static', filename='js/app.js') }}?v={{ static_v }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
